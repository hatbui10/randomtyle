<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc & Phân lớp số</title>

<style>
:root {
  --radius: 12px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 600px;
  background: #111827;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
}


input[type="text"] {
  width: 100%;
  height: 45px;
  margin-top: 10px;
  border-radius: var(--radius);
  border: 1px solid #374151;
  background: #1f2937;
  color: #fff;
  text-align: center;
}

button {
  width: 100%;
  height: 45px;
  margin-top: 10px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

textarea {
  width: 100%;
  height: 280px;
  margin-top: 15px;
  border-radius: var(--radius);
  border: 1px solid #374151;
  background: #1f2937;
  color: #fff;
  padding: 10px;
  font-family: monospace;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔢 Lọc & phân lớp số</h2>

  <input type="file" id="fileInput">

  <input type="text" id="filterInput" placeholder="(Tuỳ chọn) Lọc số bắt đầu bằng..." />

  <button onclick="processFile()">🔍 Xử lý</button>
  <button onclick="copyResult()">📋 Copy</button>
  <button onclick="downloadFile()">⬇️ Xuất file</button>

  <textarea id="output" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
</div>

<script>
let finalText = "";

function processFile() {
  const file = document.getElementById("fileInput").files[0];
  const filterValue = document.getElementById("filterInput").value.trim();

  if (!file) {
    alert("Chưa chọn file 😐");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;

    // Lấy tất cả số
    let numbers = text.match(/\d+/g) || [];

    // Lọc nếu có nhập
    if (filterValue !== "") {
      numbers = numbers.filter(num => num.startsWith(filterValue));
    }

    // Sort chuẩn số
    numbers.sort((a, b) => Number(a) - Number(b));

    // Tạo nhóm 0-9
    let groups = {};
    for (let i = 0; i <= 9; i++) {
      groups[i] = [];
    }

    // Phân lớp
    numbers.forEach(num => {
      const first = num[0];
      groups[first].push(num);
    });

    // Tạo output
    let result = [];

    for (let i = 0; i <= 9; i++) {
      if (groups[i].length > 0) {
        result.push(`--- Lớp ${i} (${groups[i].length} số) ---`);

        for (let j = 0; j < groups[i].length; j += 5) {
          result.push(groups[i].slice(j, j + 5).join(", "));
        }

        result.push("");
      }
    }

    finalText = result.join("\n");
    document.getElementById("output").value = finalText;
  };

  reader.readAsText(file);
}

function copyResult() {
  const text = document.getElementById("output");
  text.select();
  document.execCommand("copy");
  alert("Đã copy 😎");
}

function downloadFile() {
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua.txt";
  a.click();
}
</script>

</body>
</html>
