<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Random 0-1 Dynamic Shuffle</title>

<style>
body{
  margin: 0;
  padding-top: 40px; /* thay margin bằng padding */
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;

  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;

  height: 500px;
}


input{
  width: 10%;
  height : 10%;
  padding:5px;
  text-align:center;
  border-radius:6px;
  border:none;
   font-size:20px;

  margin:10px auto;
  appearance: none;
}


/* Chrome, Edge, Safari */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
  -webkit-appearance: none;
  margin: 0;
}

/* Firefox */
input[type=number]{
  -moz-appearance: textfield;
}



#spinCounter{
  margin:5px 0;
  font-size:18px;
}

#nextShuffle{
  margin-bottom:20px;
  font-size:14px;
  opacity:0.7;
}

.container{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:60px;
}



h1{
  font-size: 28px;
  text-align: center;
  color: #00ffcc;
  margin-bottom: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0,255,200,0.6);
}



.box{
  width:60px;
  height:60px;
  background:#222;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  font-weight:bold;
  border:1px solid #444;
  transition:0.3s;
}

.ratio{
  margin-top:6px;
  font-size:13px;
  opacity:0.8;
}

.zero{
  background:#1A05A2;
  color:#FBF6F6;
}

.one{
  background:#FF4400;
  color:#FBF6F6;
}

.blink{
  animation:blink 0.2s infinite alternate;
}

@keyframes blink{
  from{ transform:scale(1); opacity:1; }
  to{ transform:scale(1.15); opacity:0.5; }
}

button{
  padding: 12px 28px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;

  background: linear-gradient(135deg, #00ffcc, #00ccff);
  color: #111;

  box-shadow: 0 6px 15px rgba(0, 255, 200, 0.3);
  transition: all 0.25s ease;
}

button:hover{
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0, 255, 200, 0.45);
}

button:active{
  transform: translateY(0);
  box-shadow: 0 4px 10px rgba(0, 255, 200, 0.3);
}

.box1  {
  width: 400px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 16px;
  background: #A82323;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  text-align: center;
}




</style>
</head>

<body>
<div class="box1">
  <div>Số lần quay để có 1 tỷ lệ mới</div>
  <input type="number" id="shuffleLimit" value="5" min="1">

  <div id="spinCounter">Số lần quay: 0</div>
  <div id="nextShuffle"></div>

  <div class="container" id="container"></div>

  <button onclick="startSpin()">Quay</button>
</div>
<script>

let ratios = [0.5, 0.9, 0.1, 0.35, 0.2];
let spinCount = 0;

function initUI(){
  const container = document.getElementById("container");
  container.innerHTML = "";

  for(let i=0;i<5;i++){
    container.innerHTML += `
      <div class="item">
        <div class="box" id="b${i+1}">-</div>
        <div class="ratio" id="r${i+1}"></div>
      </div>
    `;
  }

  updateRatioUI();
}

function updateRatioUI(){
  for(let i=0;i<5;i++){
    let zero = ratios[i]*100;
    document.getElementById("r"+(i+1)).textContent =
      zero.toFixed(0) + "% 0";
  }
}

function updateCounterUI(){

  let limit = parseInt(document.getElementById("shuffleLimit").value) || 1;

  document.getElementById("spinCounter").textContent =
    "Số lần quay: " + spinCount;

  let remaining = limit - (spinCount % limit);
  if(remaining === limit) remaining = 0;

  document.getElementById("nextShuffle").textContent =
    remaining === 0
    ? "Vừa đổi tỷ lệ!"
    : "Còn " + remaining + " lượt sẽ đổi tỷ lệ";
}

function shuffleArray(arr){
  for(let i = arr.length -1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function randomByRatio(percentZero){
  return Math.random() < percentZero ? 0 : 1;
}

function setBox(id, value){
  const el = document.getElementById(id);
  el.textContent = value;
  el.classList.remove("zero","one");
  el.classList.add(value === 0 ? "zero" : "one");
}

function startSpin(){

  let duration = 3000; 
  let startTime = Date.now();
  let delay = 50;

  function spin(){

    let elapsed = Date.now() - startTime;

    for(let i=1;i<=5;i++){
      setBox("b"+i, Math.random() < 0.5 ? 0 : 1);
    }

    if(elapsed < duration){
      delay += 15;
      setTimeout(spin, delay);
    }else{

      spinCount++;

      let limit = parseInt(document.getElementById("shuffleLimit").value) || 1;

      if(spinCount % limit === 0){
        shuffleArray(ratios);
        updateRatioUI();
      }

      updateCounterUI();

      for(let i=1;i<=5;i++){
        setBox("b"+i, randomByRatio(ratios[i-1]));
        document.getElementById("b"+i).classList.add("blink");
      }

      setTimeout(()=>{
        for(let i=1;i<=5;i++){
          document.getElementById("b"+i).classList.remove("blink");
        }
      },1000);
    }
  }

  spin();
}

initUI();
updateCounterUI();

</script>

</body>
</html>
